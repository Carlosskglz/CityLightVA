<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityLight -Iniciar sesión USUARIO</title>
    <link rel="stylesheet" href="../CSS/Usuario/loginU.css">
    <link rel="stylesheet" href="../CSS/globales.css">
</head>
<body>

    <header class="barra-inframex">
        <div class="contenedor-marca">
            <div class="logo-marca"></div>
            <div class="texto-marca">
                <h1>INFRAMEX</h1>
                <p>Software, Softlife</p>
            </div>
        </div>
    </header>

    <nav class="retorno">
        <a href="../index.html" class="regresar">Volver al Inicio</a>
    </nav>

    <main class="contenedor-login">

        <header class="header-login">
            <h1 class="titulo-modulo">CityLight</h1>
            <h2>Inicio de sesión</h2>
            <p class="subtitulo-rol">Modulo de Usuario</p>
        </header>

        <form id="formulario-login-usuario" action="#" method="POST">

            <div class="grupo-campo">
                <label for="correo">Correo Electronico</label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="grupo-campo">
                <label for="contraseña">Contraseña</label>
                <input type="password" id="contraseña" name="contraseña" placeholder="Ingresa tu contraseña" required>
            </div>
            
            <button type="submit" class="btn-ingresar">Ingresar</button>
        </form>
        
        <footer class="footer-login">
            <p>No tienes una cuenta? <a href="registroU.html" class="enlace-registro">Registrate aqui</a></p>
        </footer>
    </main>
</body>
</html>
