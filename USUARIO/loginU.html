<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityLight - Iniciar sesión USUARIO</title>
    <link rel="stylesheet" href="../CSS/Usuario/loginU.css">
    <link rel="stylesheet" href="../CSS/globales.css">
</head>
<body>

    <header class="barra-inframex">
        <div class="contenedor-marca">
            <div class="logo-marca"></div>
            <div class="texto-marca">
                <h1>INFRAMEX</h1>
                <p>Software, Softlife</p>
            </div>
        </div>
    </header>

    <nav class="retorno">
        <a href="../index.html" class="regresar">Volver al Inicio</a>
    </nav>

    <main class="contenedor-login">

        <header class="header-login">
            <h1 class="titulo-modulo">CityLight</h1>
            <h2>Inicio de sesión</h2>
            <p class="subtitulo-rol">Modulo de Usuario</p>
        </header>

        <form id="form-login" data-rol-esperado="usuario">

            <div class="grupo-campo">
                <label for="correo-login">Correo Electrónico</label>
                <input type="email" id="correo-login" name="correo" placeholder="ejemplo@correo.com">
                <span class="error" id="error-correo"></span>
            </div>

            <div class="grupo-campo">
                <label for="contrasena-login">Contraseña</label>
                <input type="password" id="contrasena-login" name="contrasena" placeholder="Ingresa tu contraseña">
                <span class="error" id="error-contrasena"></span>
            </div>

            <span class="error" id="error-general"></span>

            <button type="submit" class="btn-ingresar" id="btn-login">Ingresar</button>

        </form>  <!-- ← cierra aquí, después del botón -->

        <footer class="footer-login">
            <p>No tienes una cuenta? <a href="registroU.html" class="enlace-registro">Regístrate aquí</a></p>
        </footer>
    </main>

    <script src="../JS/login.js"></script>
</body>
</html>
