<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityLight - Reportar Falla</title>
    <link rel="stylesheet" href="../CSS/globales.css">
    <link rel="stylesheet" href="../CSS/Usuario/reportarU.css">
</head>
<body data-rol-requerido="usuario">

    <header class="barra-inframex">
        <div class="contenedor-marca">
            <div class="logo-marca"></div>
            <div class="texto-marca">
                <h1>INFRAMEX</h1>
                <p>Software, Softlife</p>
            </div>
        </div>
    </header>

    <nav class="retorno">
        <a href="inicioU.html" class="regresar">Volver al Menú</a>
    </nav>

    <main class="contenedor-reporte">
        <header class="header-reporte">
            <h1 class="titulo-modulo">CityLight</h1>
            <h2>Reportar Falla de Alumbrado</h2>
            <p class="subtitulo-reporte">Ingresa los datos lo más precisos posible para agilizar la reparación</p>
        </header>

        <form id="form-reporte" enctype="multipart/form-data">

            <div class="columnas-formulario">

                <div class="columna-tarjeta">
                    <h3 class="titulo-seccion">
                        <span class="icono-seccion">📍</span> 1. Ubicación del incidente
                    </h3>

                    <div class="grupo-campo">
                        <label for="alcaldia-reporte">Alcaldía</label>
                        <select id="alcaldia-reporte" name="id_alcaldia">
                            <option value="" selected>Selecciona tu alcaldía</option>
                            <!-- Se llena dinámicamente desde la BD -->
                        </select>
                        <span class="error" id="error-alcaldia"></span>
                    </div>

                    <div class="grupo-campo">
                        <label for="colonia-reporte">Colonia</label>
                        <select id="colonia-reporte" name="id_colonia" disabled>
                            <option value="" selected>Selecciona primero una alcaldía</option>
                        </select>
                        <span class="error" id="error-colonia"></span>
                    </div>

                    <div class="grupo-campo">
                        <label for="calle-reporte">Calle</label>
                        <input type="text" id="calle-reporte" name="calle" placeholder="Ej. Av. Reforma, entre Calle X y Y">
                        <span class="error" id="error-calle"></span>
                    </div>

                    <div class="grupo-campo">
                        <label for="numero-reporte">Número (casa/poste de referencia)</label>
                        <input type="text" id="numero-reporte" name="numero_casa" placeholder="Ej. 123 o S/N">
                        <span class="error" id="error-numero"></span>
                    </div>
                </div>

                <div class="columna-tarjeta">
                    <h3 class="titulo-seccion">
                        <span class="icono-seccion">⚠️</span> 2. Detalles de la Falla
                    </h3>

                    <div class="grupo-campo">
                        <label for="problema-reporte">Tipo de Falla</label>
                        <select id="problema-reporte" name="id_problema">
                            <option value="" selected>Selecciona el tipo de falla</option>
                            <!-- Se llena dinámicamente desde la BD -->
                        </select>
                        <span class="error" id="error-problema"></span>
                    </div>

                    <div class="grupo-campo">
                        <label for="tiempo-reporte">¿Cuánto tiempo lleva la falla?</label>
                        <select id="tiempo-reporte" name="tiempo_falla">
                            <option value="" selected>Selecciona una opción</option>
                            <option value="Menos de una semana">Menos de una semana</option>
                            <option value="De 1 a 4 semanas">De 1 a 4 semanas</option>
                            <option value="Más de un mes">Más de un mes</option>
                        </select>
                        <span class="error" id="error-tiempo"></span>
                    </div>

                    <div class="grupo-campo">
                        <label>Adjuntar Imagen de Evidencia</label>
                        <div class="zona-carga">
                            <input type="file" id="imagen-reporte" name="imagen" accept="image/png, image/jpeg, image/webp">
                            <div class="contenido-carga">
                                <span class="icono-carga">📸</span>
                                <p class="texto-carga-principal">Haz clic o arrastra una foto aquí</p>
                                <p class="texto-carga-secundario" id="nombre-archivo"></p>
                            </div>
                        </div>
                        <span class="error" id="error-imagen"></span>
                    </div>
                </div>

            </div>

            <div class="ancho-completo">
                <div class="grupo-campo">
                    <label for="comentarios-reporte">Comentarios u observaciones extra</label>
                    <textarea id="comentarios-reporte" name="desc_extra" rows="3" placeholder="Ej. El poste se encuentra frente a la tienda de abarrotes, tapado por las ramas de un árbol..."></textarea>
                    <span class="error" id="error-comentarios"></span>
                </div>

                <span class="error" id="error-general"></span>

                <button type="submit" class="btn-enviar-reporte" id="btn-reportar">Enviar Reporte</button>
            </div>

        </form>
    </main>

    <script src="../JS/auth.js"></script>
    <script src="../JS/reportes.js"></script>
</body>
</html>
