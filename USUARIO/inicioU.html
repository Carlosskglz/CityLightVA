<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityLight - Panel de Usuario</title>
    <link rel="stylesheet" href="../CSS/globales.css">
    <link rel="stylesheet" href="../CSS/Usuario/inicioU.css">
</head>
<body data-rol-requerido="usuario"> 
    <header class="barra-inframex">
        <div class="contenedor-marca">
            <div class="logo-marca"></div>
            <div class="texto-marca">
                <h1>INFRAMEX</h1>
                <p>Software, Softlife</p>
            </div>
        </div>
    </header>

    <nav class="retorno">
        <button onclick="cerrarSesion()" class="regresar">Cerrar Sesión</button>
    </nav>

    <main>
        <section class="contenedor-bienvenida">
            <h2 class="titulo-proyecto">CityLight</h2>
            <p class="subtitulo-modulo">Bienvenido al Módulo de Usuario</p>
        </section>

        <section class="seleccion-rol">
            <h3>¿Qué deseas hacer hoy?</h3>

            <div class="grupo-botones">
                <a href="reportarU.html">
                    <button type="button" id="btn-reportar">Reportar Falla</button>
                </a>
                <a href="historialU.html">
                    <button type="button" id="btn-historial">Ver Reportes Previos</button>
                </a>
            </div>
        </section>
    </main>

    <script src="../JS/auth.js"></script>
</body>
</html>
