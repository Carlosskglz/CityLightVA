<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityLight -Registro de Usuario</title>
    <link rel="stylesheet" href="../CSS/Usuario/registroU.css">
    <link rel="stylesheet" href="../CSS/globales.css">
</head>
<body>

    <header class="barra-inframex">
        <div class="contenedor-marca">
            <div class="logo-marca"></div>
            <div class="texto-marca">
                <h1>INFRAMEX</h1>
                <p>Software, Softlife</p>
            </div>
        </div>
    </header>

    <nav class="retorno">
        <a href="loginU.html">Volver al Inicio de Sesión</a>
    </nav>

    <main class="contenedor-registro">
        <header class="header-registro">
            <h1 class="titulo-modulo">CityLight</h1>
            <h2>Crear cuenta</h2>
            <p class="subtitulo-registro">Registrate como Usuario para reportar fallas</p>
        </header>

        <form id="formulario-registro-usuario" action="#" method="POST">

            <div class="grupo-campo">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="grupo-campo">
                <label for="correo">Correo Electronico</label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="grupo-campo">
                <label for="telefono">Numero de Telefono</label>
                <input type="tel" id="telefono" name="telefono" required>
            </div>

            <div class="grupo-campo">
                <label for="contraseña">Contraseña</label>
                <input type="password" id="contraseña" name="contraseña" placeholder="Crea una contraseña segura" required>
            </div>

            <div class="grupo-campo">
                <label for="confirmar-contraseña">Confirmar Contraseña</label>
                <input type="password" id="confirmar-contraseña" name="confirmar-contraseña" placeholder="Repite tu contraseña" required>
            </div>

            <button type="submit" class="btn-registrar">Registrarse</button>
        </form>
        
        <footer class="footer-login">
            <p>Ya tienes una cuenta? <a href="loginU.html" class="enlace-login">Inicia Sesión aquí</a></p>
        </footer>
    </main>
</body>
</html>
